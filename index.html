<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大民课程表 - 发布页</title>
    <link rel="icon" href="img/ic_launcher.webp" type="image/webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: bg-blue,
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 backdrop-blur-md bg-white/70 dark:bg-slate-900/70 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <img src="img/ic_launcher.webp" alt="Logo" class="w-9 h-9 mix-blend-multiply dark:mix-blend-normal">
                    <span class="font-bold text-xl tracking-tight">大民课程表</span>
                </div>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-yellow-400"></i>
                    </button>
                    <div class="flex flex-col sm:flex-row justify-center items-center gap-4" id="add">
                        <a id="add-btn" href="https://qm.qq.com/cgi-bin/qm/qr?k=m6Jidr6OGC1tJAHaAoK5Zrgt1libSH86&jump_from=webapi&authKey=aK+hsnk1UwcNvF9JAc9ZfInt7wYrpOS7MJery63XOD6ec/zX/5/2NwixU7Ek6T7T" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-blue-500 dark:bg-blue-500 text-white dark:text-slate-900 px-3 py-2 rounded-2xl font-semibold transition-all hover:scale-105 shadow-xl">
                            <span id="add-text">加入 QQ 群</span>
                        </a>
                    </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow pt-32 pb-12">
        <section class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 text-slate-900 dark:text-white">
                为安卓用户学生打造的课程表
            </h1>
            <img src="img/ic_launcher.webp" alt="App Icon" class="w-32 h-32 mx-auto mb-6 mix-blend-multiply dark:mix-blend-normal"> 
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4" id="download">
                <a id="android-dl-btn" href="https://gitee.com/restarhalf/schedule/releases/download/1.9/app-release.apk" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-8 py-3.5 rounded-2xl font-semibold transition-all hover:scale-105 shadow-xl">
                    <span id="dl-text">下载 Android 版</span>
                </a>
            </div>
            <p id="version-info" class="mt-4 text-sm text-slate-500">正在检查最新版本...</p>
        </section>

        <!-- Features -->
        <section class="max-w-6xl mx-auto px-4 py-20 mt-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-slate-100 dark:border-slate-700 hover:-translate-y-1 transition-transform">
                    <div class="w-12 h-12 rounded-2xl bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400 mb-6">
                        <i data-lucide="bell-ring" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-3">精准考试·课程提醒</h3>
                    <p class="text-slate-600 dark:text-slate-400">闹钟机制，帮您考试·上课不再迟到。</p>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-slate-100 dark:border-slate-700 hover:-translate-y-1 transition-transform">
                    <div class="w-12 h-12 rounded-2xl bg-purple-50 dark:bg-purple-900/30 flex items-center justify-center text-purple-600 dark:text-purple-400 mb-6">
                        <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-3">极简卡片 UI</h3>
                    <p class="text-slate-600 dark:text-slate-400">沉浸式的界面设计，去除一切干扰体验的冗余元素，一眼获取当日重点。</p>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-sm border border-slate-100 dark:border-slate-700 hover:-translate-y-1 transition-transform">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600 dark:text-emerald-400 mb-6">
                        <i data-lucide="shield-check" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-3">完全隐私保护</h3>
                    <p class="text-slate-600 dark:text-slate-400">本地优先策略架构，无广告、无多余的权限获取，真正属于您的私人应用。</p>
                </div>
            </div>
        </section>
    
    </main>

    <!-- Init -->
    <script src="js/main.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
